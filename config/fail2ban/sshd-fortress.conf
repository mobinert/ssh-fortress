# SSH Fortress — custom fail2ban filter
# Place at /etc/fail2ban/filter.d/sshd-fortress.conf

[Definition]
_daemon = sshd

# Capture failed auth from multiple sshd log formats
failregex = ^%(__prefix_line)s(?:error: PAM: )?[aA]uthentication (?:failure|error) for .* from <HOST>( via \S+)?\s*$
            ^%(__prefix_line)sFailed \S+ for (?P<user>.+?) from <HOST>(?: port \d+)?(?:\s+ssh\d*)?$
            ^%(__prefix_line)s[iI]nvalid user (?P<user>\S+)? from <HOST>(?: port \d+)?$
            ^%(__prefix_line)sROOT LOGIN REFUSED.+ <HOST>$
            ^%(__prefix_line)s[iI]llegal user .+ from <HOST>$
            ^%(__prefix_line)sUser .+ from <HOST> not allowed because not listed in AllowUsers$
            ^%(__prefix_line)sUser .+ from <HOST> not allowed because listed in DenyUsers$
            ^%(__prefix_line)sUser .+ from <HOST> not allowed because not in any group$
            ^%(__prefix_line)srefused connect from \S+ \(<HOST>\)$
            ^%(__prefix_line)sReceived disconnect from <HOST>: 3: \S+: Auth fail$
            ^%(__prefix_line)sUser .+ from <HOST> not allowed because none of user's groups are listed in AllowGroups$
            ^(?P<__prefix>%(__prefix_line)s)User .+ from <HOST> not allowed because not listed in AllowUsers$
            ^%(__prefix_line)sFailed password for .+ from <HOST>$
            ^%(__prefix_line)sError: maximum authentication attempts exceeded for .+ from <HOST>$

ignoreregex =

[Init]
journalmatch = _SYSTEMD_UNIT=sshd.service + _COMM=sshd
