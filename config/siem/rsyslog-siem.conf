# SSH Fortress — rsyslog configuration
# Place at /etc/rsyslog.d/10-ssh-fortress.conf
#
# Forwards SSH auth events to a remote SIEM and local fortress log

# ── Load modules ─────────────────────────────────────────────
module(load="imfile")
module(load="omfwd")

# ── Local structured log (JSON) ──────────────────────────────
template(name="SSHFortressJSON" type="list") {
    constant(value="{")
    constant(value="\"@timestamp\":\"")  property(name="timereported" dateFormat="rfc3339") constant(value="\",")
    constant(value="\"host\":\"")        property(name="hostname")                           constant(value="\",")
    constant(value="\"facility\":\"")    property(name="syslogfacility-text")               constant(value="\",")
    constant(value="\"severity\":\"")    property(name="syslogseverity-text")               constant(value="\",")
    constant(value="\"program\":\"")     property(name="programname")                        constant(value="\",")
    constant(value="\"pid\":\"")         property(name="procid")                             constant(value="\",")
    constant(value="\"message\":\"")     property(name="msg" format="json")                 constant(value="\"")
    constant(value="}\n")
}

# ── CEF template for SIEM forwarding ────────────────────────
template(name="SSHFortressCEF" type="string"
  string="CEF:0|SSH-Fortress|sshd|1.0|%syslogseverity-text%|%msg%|5|src=%fromhost-ip% shost=%hostname% spt=%procid% msg=%msg%\n"
)

# ── RFC5424 template ─────────────────────────────────────────
template(name="RFC5424FWD" type="string"
  string="<%PRI%>1 %TIMESTAMP:::date-rfc3339% %HOSTNAME% %APP-NAME% %PROCID% %MSGID% - %msg%\n"
)

# ── Capture auth.log via imfile ──────────────────────────────
input(type="imfile"
  File="/var/log/auth.log"
  Tag="sshd"
  Severity="info"
  Facility="auth"
  freshStartTail="off"
  readMode="0"
)

# ── Forward SSH auth events to remote SIEM (TCP+TLS) ─────────
if $programname == "sshd" then {
  # Local JSON log (always)
  action(
    type="omfile"
    file="/var/log/ssh-fortress/rsyslog-auth.jsonl"
    template="SSHFortressJSON"
    flushOnTXEnd="on"
    asyncWriting="on"
    flushInterval="1"
    ioBufferSize="64k"
  )

  # Remote SIEM over TCP/TLS — change host/port as needed
  action(
    type="omfwd"
    Target="siem.internal"
    Port="6514"
    Protocol="tcp"
    template="SSHFortressCEF"
    StreamDriver="gtls"
    StreamDriverMode="1"
    StreamDriverAuthMode="x509/name"
    StreamDriverPermittedPeers="siem.internal"
  )

  # UDP syslog fallback (no TLS)
  # action(type="omfwd" Target="siem.internal" Port="514" Protocol="udp" template="SSHFortressCEF")
}

# ── Rate limit to prevent log flooding ──────────────────────
$SystemLogRateLimitInterval 2
$SystemLogRateLimitBurst 500
