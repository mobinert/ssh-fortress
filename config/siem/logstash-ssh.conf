# SSH Fortress — Logstash pipeline
# Parses, enriches, and routes SSH events to Elasticsearch + Splunk + Syslog

input {
  beats {
    port => 5044
    ssl => true
    ssl_certificate => "/etc/logstash/certs/logstash.crt"
    ssl_key => "/etc/logstash/certs/logstash.key"
  }

  # Direct syslog input (for systems sending rsyslog)
  syslog {
    port => 5514
    type => "syslog"
    codec => plain { charset => "UTF-8" }
  }

  # TCP JSON (from SIEMForwarder JSON backend)
  tcp {
    port => 5000
    codec => json_lines
    type => "ssh-fortress-json"
  }
}

filter {

  # ── Parse raw auth.log lines ────────────────────────────────────────────────
  if [fields][log_type] == "auth" {
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} sshd\[%{POSINT:sshd_pid}\]: %{GREEDYDATA:sshd_message}",
        ]
      }
    }

    # Failed auth
    grok {
      match => {
        "sshd_message" => [
          "Failed %{WORD:auth_method} for %{NOTSPACE:username} from %{IPORHOST:src_ip} port %{NUMBER:src_port:int}",
          "Invalid user %{NOTSPACE:username} from %{IPORHOST:src_ip} port %{NUMBER:src_port:int}",
          "Accepted %{WORD:auth_method} for %{NOTSPACE:username} from %{IPORHOST:src_ip} port %{NUMBER:src_port:int}",
          "Disconnected from (?:authenticating )?(?:invalid )?user %{NOTSPACE:username} %{IPORHOST:src_ip} port %{NUMBER:src_port:int}",
        ]
      }
      tag_on_failure => []
    }

    # Classify event type
    if [sshd_message] =~ /Failed/ {
      mutate { add_field => { "event_type" => "AUTH_FAILURE" } }
    } else if [sshd_message] =~ /Accepted/ {
      mutate { add_field => { "event_type" => "AUTH_SUCCESS" } }
    } else if [sshd_message] =~ /Invalid user/ {
      mutate { add_field => { "event_type" => "INVALID_USER" } }
    } else if [sshd_message] =~ /Disconnected/ {
      mutate { add_field => { "event_type" => "DISCONNECT" } }
    }

    # GeoIP enrichment
    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "geo"
        database => "/etc/logstash/GeoLite2-City.mmdb"
        fields => ["city_name", "country_name", "country_code2", "location"]
      }
    }

    # Timestamp normalisation
    date {
      match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
      target => "@timestamp"
    }
  }

  # ── SSH Fortress JSONL events (already structured) ──────────────────────────
  if [fields][log_type] == "fortress_event" or [type] == "ssh-fortress-json" {
    if [src_ip] {
      geoip {
        source => "src_ip"
        target => "geo"
        database => "/etc/logstash/GeoLite2-City.mmdb"
        fields => ["city_name", "country_name", "country_code2", "location"]
      }
    }
  }

  # ── Common enrichment ────────────────────────────────────────────────────────
  mutate {
    add_field => {
      "data_source"    => "ssh-fortress"
      "[@metadata][target_index]" => "ssh-fortress-%{+YYYY.MM.dd}"
    }
    convert => { "src_port" => "integer" }
    remove_field => ["host", "agent", "ecs", "input", "log"]
  }
}

output {
  # Primary: Elasticsearch
  elasticsearch {
    hosts => ["https://localhost:9200"]
    index => "%{[@metadata][target_index]}"
    # api_key => "id:api_key"
    ssl => true
    cacert => "/etc/logstash/certs/ca.crt"
  }

  # Optional: Splunk HEC
  # http {
  #   url => "https://splunk:8088/services/collector"
  #   http_method => "post"
  #   headers => { "Authorization" => "Splunk <HEC_TOKEN>" }
  #   format => "json"
  #   mapping => { "event" => "%{message}" }
  # }

  # Debug (disable in production)
  # stdout { codec => rubydebug }
}
